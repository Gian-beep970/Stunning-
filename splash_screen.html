{% extends "base.html" %}

{% block title %}Welcome - IMPERIAL HOUSE{% endblock %}

{% block content %}
<div class="splash-container">
    <!-- Animated House Icon -->
    <div class="splash-content">
        <div class="house-icon-wrapper">
            <i class="bi bi-house-fill"></i>
        </div>
        <h1 class="splash-text">Welcome, {{ current_user.full_name }}! 🏠</h1>
    </div>
</div>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

.splash-container {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    position: fixed;
    top: 0;
    left: 0;
    z-index: 9999;
    overflow: hidden;
}

.splash-content {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
}

.house-icon-wrapper {
    position: relative;
    width: 200px;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: houseEntrance 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

.house-icon-wrapper i {
    font-size: 120px;
    color: #fff;
    text-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    animation: housePulse 2s ease-in-out infinite;
}

.splash-text {
    color: #fff;
    font-size: 32px;
    font-weight: 700;
    animation: textFade 1s ease-in 0.3s forwards;
    opacity: 0;
    letter-spacing: 1px;
}

/* Animations */
@keyframes houseEntrance {
    0% {
        opacity: 0;
        transform: scale(0.5) rotate(-20deg);
    }
    50% {
        transform: scale(1.05) rotate(5deg);
    }
    100% {
        opacity: 1;
        transform: scale(1) rotate(0deg);
    }
}

@keyframes housePulse {
    0%, 100% {
        transform: scale(1);
        filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.3));
    }
    50% {
        transform: scale(1.1);
        filter: drop-shadow(0 15px 40px rgba(0, 0, 0, 0.4));
    }
}

@keyframes textFade {
    0% {
        opacity: 0;
        transform: translateY(20px);
    }
    100% {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeOutSplash {
    0% {
        opacity: 1;
        backdrop-filter: blur(0px);
    }
    100% {
        opacity: 0;
        backdrop-filter: blur(10px);
    }
}

.splash-exit {
    animation: fadeOutSplash 0.8s ease-out forwards;
}

/* Responsive */
@media (max-width: 768px) {
    .house-icon-wrapper i {
        font-size: 80px;
    }
    
    .splash-text {
        font-size: 24px;
    }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // After 5 seconds, fade out and redirect
    setTimeout(function() {
        const container = document.querySelector('.splash-container');
        container.classList.add('splash-exit');
        
        // Redirect after fade animation completes
        setTimeout(function() {
            {% if current_user.user_type == 'landlord' %}
                window.location.href = "{{ url_for('landlord.dashboard') }}";
            {% else %}
                window.location.href = "{{ url_for('tenant.dashboard') }}";
            {% endif %}
        }, 800);
    }, 5000);
});
</script>
{% endblock %}
