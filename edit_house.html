{% extends "base.html" %}

{% block title %}Edit House - IMPERIAL HOUSE{% endblock %}

{% block content %}
<div class="container mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0"><i class="bi bi-pencil-square"></i> Edit House</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST" novalidate>
                        <div class="mb-3">
                            <label class="form-label">House Title</label>
                            <input type="text" name="title" class="form-control" value="{{ house.title }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="5" required>{{ house.description }}</textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Rent Price (KES)</label>
                                <input type="number" name="rent_price" class="form-control" value="{{ house.rent_price }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Rent Period</label>
                                <select name="rent_period" class="form-select" required>
                                    <option value="monthly" {% if house.rent_period == 'monthly' %}selected{% endif %}>Monthly</option>
                                    <option value="yearly" {% if house.rent_period == 'yearly' %}selected{% endif %}>Yearly</option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Bedrooms</label>
                                <input type="number" name="bedrooms" class="form-control" value="{{ house.bedrooms }}" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Bathrooms</label>
                                <input type="number" name="bathrooms" class="form-control" value="{{ house.bathrooms }}" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Square Feet</label>
                                <input type="number" name="square_feet" class="form-control" value="{{ house.square_feet or '' }}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">City</label>
                            <input type="text" name="city" class="form-control" value="{{ house.city }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Full Address</label>
                            <input type="text" name="address" class="form-control" value="{{ house.address }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Amenities (comma-separated)</label>
                            <input type="text" name="amenities" class="form-control" value="{{ house.amenities }}">
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('landlord.my_houses') }}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-danger">
                                <i class="bi bi-check-circle"></i> Save Changes
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
